# yaml-language-server: $schema=../../../../mex-assets/mappings/__schema__/ResourceMapping.json

hadPrimarySource:
  - mappingRules:
      - rule: Assign 'stable target id'
identifierInPrimarySource:
  - mappingRules:
      - setValues: test_raw_data
        rule: Set value as indicated.
accessRestriction:
  - mappingRules:
      - setValues: https://mex.rki.de/item/access-restriction-2
        rule: Set value as indicated.
contact:
  - mappingRules:
      - forValues:
          - C1
        rule: Match value
description:
  - mappingRules:
      - setValues:
          - value: voluptua
            language: en
        rule: Set value as indicated.
externalPartner:
  - mappingRules:
      - forValues:
          - At
        rule: Use values
hasLegalBasis:
  - mappingRules:
      - setValues:
          - language: en
            value: Informed consent
          - language: de
            value: Informierte Einwilligung
isPartOf:
  - mappingRules:
      - rule: Assign stableTargetId
keyword:
  - mappingRules:
      - setValues:
          - value: vero eos
            language: en
        rule: Set values as indicated.
language:
  - mappingRules:
      - setValues:
          - https://mex.rki.de/item/language-2
        rule: Set values as indicated.
    comment: Add https://mex.rki.de/item/language-3
meshId:
  - mappingRules:
      - setValues:
          - http://id.nlm.nih.gov/mesh/D000086382 #COVID-19
        rule: Set values as indicated.
method:
  - mappingRules:
      - setValues:
          - value: et accusam
            language: en
          - value: et justo
            language: de
        rule: Set values as indicated.
publisher:
  - mappingRules:
      - forValues:
          - duo dolores
        rule: Use value to match with wikidata extractor.
resourceCreationMethod:
  - mappingRules:
      - setValues:
          - https://mex.rki.de/item/resource-creation-method-2
resourceTypeGeneral:
  - mappingRules:
      - setValues:
          - https://mex.rki.de/item/resource-type-general-15
        rule: Set value as indicated.
resourceTypeSpecific:
  - mappingRules:
      - setValues:
          - language: en
            value: Questionnaire
          - language: de
            value: Fragebogen
rights:
  - mappingRules:
      - setValues:
          - value: et ea rebum
            language: de
        rule: Set value as indicated.
spatial:
  - mappingRules:
      - setValues:
          - value: Stet
            language: en
        rule: Set values as indicated.
temporal:
  - mappingRules:
      - setValues: 2021-05-01 - 2021-12-31
        rule: Set values as indicated.
theme:
  - mappingRules:
      - setValues:
          - https://mex.rki.de/item/theme-11
          - https://mex.rki.de/item/theme-37
        rule: Set values as indicated.
title:
  - mappingRules:
      - setValues:
          - value: clita
            language: en
          - value: kasd
            language: en
        rule: Set values as indicated.
    comment: n/a
unitInCharge:
  - mappingRules:
      - forValues:
          - C1
        rule: Match value with corresponding identifier using organigram extractor.
wasGeneratedBy:
  - mappingRules:
      - forValues:
          - 0000-1005
        rule: Use value to match with identifierInPrimarySource in international projects. Assign stableTargetId of the matching item.
