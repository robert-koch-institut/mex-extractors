dataType:
  - fieldInPrimarySource:
    locationInPrimarySource:
    mappingRules:
      - forValues:
          - "0" #DummyType
          - "20" #Float
          - "22" #varBinary
      - rule:
      - forValues:
          - "1" #GUID
          - "4" #String10
          - "5" #String50
          - "6" #String255
          - "7" #StringMax
          - "9" #Status -> Catalogue
          - "10" # StringSite
          - "11" #Lookup -> Catalogue
        setValues: https://mex.rki.de/item/data-type-2 #string
      - forValues:
          - "2" #Int
          - "21" #Bigint
        setValues: https://mex.rki.de/item/data-type-1 #integer
      - forValues:
          - "3" #DateTime
        setValues: https://mex.rki.de/item/data-type-4 #datetime
      - forValues:
          - "8" #Boolean
        setValues: https://mex.rki.de/item/data-type-3 #boolean
