services:
  postgres:
    image: postgres:18.4-trixie
    environment:
      POSTGRES_USER: dagster
      POSTGRES_PASSWORD: dagster
      POSTGRES_DB: dagster
    volumes:
      - pgdata:/var/lib/postgresql/data
  dagster-daemon:
    build:
      context: .
    entrypoint: ["dagster-daemon", "run", "-w", "workspace.yaml"]
    depends_on:
      - postgres
    volumes:
      - ./dagster-compose.yaml:/app/dagster/dagster.yaml:ro
      - dagster:/app/work:rw
  dagster-webserver:
    build:
      context: .
    ports:
      - 3000:3000
    entrypoint: ["dagster-webserver", "--host", "0.0.0.0", "-w", "workspace.yaml"]
    depends_on:
      - postgres
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/dagit_info"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3
    volumes:
      - ./dagster-compose.yaml:/app/dagster/dagster.yaml:ro
      - dagster:/app/work:rw
  slapd:
    image: thoteam/slapd-server-mock
    ports:
      - 636:636
    volumes:
      - ./assets/raw-data/ldap/:/bootstrap/
    expose:
      - 636
  mailpit:
    image: axllent/mailpit:v1.30
    ports:
      - 1025:1025
      - 8025:8025
    environment:
      - MP_SMTP_AUTH_ALLOW_INSECURE=1
      - MP_SMTP_AUTH_ACCEPT_ANY=1
      - MP_UI_AUTH=user:password
    expose:
      - 8025
  mssql:
    # engine pulled from Microsoft, pinned by digest (2019-latest); never re-hosted
    image: mcr.microsoft.com/mssql/server:2019-latest@sha256:46f719fd3457d4e7e8e5845fe00c35c20e7bae7ff1e8b9fe595f2a81029f5ba8
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=${MSSQL_SA_PASSWORD:-MEx_testing1234}
    ports:
      - 1433:1433
    volumes:
      - mssql:/var/opt/mssql
    healthcheck:
      test: [ "CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -C -Q 'SELECT 1' -b" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
  sql-testing-seed:
    # version-pinned seed fixture published by mex-testing (public GHCR, engine-free)
    image: ghcr.io/robert-koch-institut/mex-testing/sql-testing-seed:${MEX_TESTING_VERSION:-1.2}
    depends_on:
      mssql:
        condition: service_healthy
    environment:
      - SEED_HOST=mssql
      - SEED_SA_PASSWORD=${MSSQL_SA_PASSWORD:-MEx_testing1234}
    restart: "no"
volumes:
  pgdata:
  mssql:
  dagster:
    driver: local
    driver_opts:
      type: tmpfs
      device: tmpfs
      o: mode=1777
